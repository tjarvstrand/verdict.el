name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md']
  pull_request:
    paths-ignore: ['**.md']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - 29.1
          - 30.1
          - snapshot

    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run deps

      - name: Byte-compile
        run: mise run '//...:compile'

      - name: Lint
        run: mise run '//...:lint'

      - name: Checkdoc
        run: mise run '//...:checkdoc'

      - name: Test
        run: mise run '//...:test'

experimental_monorepo_root = true

[settings]
experimental = true

[monorepo]
config_roots = ["packages/*"]

[vars]
# Cascades to child configs. Children must override `main_file`; `test_library`
# is required only by elisp:test; `extra_load_path_args` is for sibling-package
# -L flags. The empty defaults here also let `mise tasks --all` render at root
# without a context error.
repo_root = "{{config_root}}"
main_file = ""
test_library = ""
extra_load_path_args = ""

[tasks.deps]
description = "Install shared test dependencies into .packages/"
run = """
emacs -batch \
  --eval '(setq package-user-dir (expand-file-name ".packages" default-directory))' \
  --eval '(package-initialize)' \
  --eval '(add-to-list (quote package-archives) (cons "melpa" "https://melpa.org/packages/") t)' \
  --eval '(package-refresh-contents)' \
  --eval '(dolist (pkg (quote (buttercup treemacs dash s f yaml package-lint))) (unless (package-installed-p pkg) (package-install pkg)))'
"""

# ---------------------------------------------------------------------------
# Reusable task templates extended by per-package configs.
# Required vars on the extending package: main_file (and test_library for test).
# Optional: extra_load_path_args (for sibling-package -L flags).
# Cwd is the extending task's config_root (the package directory).
# ---------------------------------------------------------------------------

[task_templates."elisp:compile"]
description = "Byte-compile a package's main .el"
run = """
emacs -batch \
  --eval '(setq package-user-dir (expand-file-name ".packages" "{{ vars.repo_root }}"))' \
  --eval '(package-initialize)' \
  {{ vars.extra_load_path_args }} \
  -L . \
  --eval '(setq byte-compile-error-on-warn t)' \
  -f batch-byte-compile \
  {{ vars.main_file }}
"""

[task_templates."elisp:lint"]
description = "Run lint check"
run = """
emacs -batch \
  --eval '(setq package-user-dir (expand-file-name ".packages" "{{ vars.repo_root }}"))' \
  --eval '(package-initialize)' \
  {{ vars.extra_load_path_args }} \
  --eval '(require (quote package-lint))' \
  --eval '(setq package-lint-main-file "{{ vars.main_file }}")' \
  --eval '(setq package-lint-batch-fail-on-warnings t)' \
  --eval '(advice-add (quote package-lint--check-packages-installable) :around (lambda (fn deps) (funcall fn (seq-remove (lambda (d) (eq (car d) (quote verdict))) deps))))' \
  -f package-lint-batch-and-exit \
  {{ vars.main_file }}
"""

[task_templates."elisp:checkdoc"]
description = "Run checkdoc"
run = """
emacs -batch \
  --eval '(setq package-user-dir (expand-file-name ".packages" "{{ vars.repo_root }}"))' \
  --eval '(package-initialize)' \
  {{ vars.extra_load_path_args }} \
  -L . \
  --eval '(require (quote checkdoc))' \
  --eval '(let ((warning-minimum-log-level :error)) (checkdoc-file "{{ vars.main_file }}"))'
"""

[task_templates."elisp:test"]
description = "Run tests"
run = """
emacs -batch \
  --eval '(setq package-user-dir (expand-file-name ".packages" "{{ vars.repo_root }}"))' \
  --eval '(package-initialize)' \
  {{ vars.extra_load_path_args }} \
  -L . \
  -L test \
  -l buttercup \
  -l {{ vars.test_library }} \
  -f buttercup-run
"""
